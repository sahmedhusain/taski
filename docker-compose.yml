services:
  db:
    build:
      context: ./database
      dockerfile: Dockerfile
    restart: always
    environment:
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
      POSTGRES_DB: "${DB_NAME:-todo}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-todo}"]
      interval: 3s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL:-admin@taski.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:-admin}"
    ports:
      - "127.0.0.1:8085:80"
    depends_on:
      - db
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "${PORT:-8080}"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      DB_HOST: "${DB_HOST_DOCKER:-db}"
      DB_PORT: "${DB_PORT_DOCKER:-5432}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_NAME: "${DB_NAME:-todo}"
      DB_SSLMODE: "${DB_SSLMODE:-disable}"
      JWT_SECRET: "${JWT_SECRET:-super_secure_jwt_secret_change_me_in_production}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/taski
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BACKEND_PORT: "${PORT:-8080}"
      NGINX_ENVSUBST_FILTER: "BACKEND_PORT"
    depends_on:
      - backend

volumes:
  pgdata:
