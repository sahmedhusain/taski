services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo
    # NOTE: NO ports mapping to satisfy network isolation rules
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: "8080"
      ENVIRONMENT: "production"
      DB_HOST: "db"
      DB_PORT: "5432"
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "todo"
      DB_SSLMODE: "disable"
      JWT_SECRET: "super_secure_jwt_secret_change_me_in_production"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/taski
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
