services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo"]
      interval: 3s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@taski.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8085:80"
    depends_on:
      - db
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "${PORT:-8080}"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      DB_HOST: "${DB_HOST_DOCKER:-db}"
      DB_PORT: "${DB_PORT_DOCKER:-5432}"
      DB_USER: "${DB_USER:-postgres}"
      DB_PASSWORD: "${DB_PASSWORD:-postgres}"
      DB_NAME: "${DB_NAME:-todo}"
      DB_SSLMODE: "${DB_SSLMODE:-disable}"
      JWT_SECRET: "${JWT_SECRET:-super_secure_jwt_secret_change_me_in_production}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/taski
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80"
    extra_hosts:
      - "backend:host-gateway"
      - "host.docker.internal:host-gateway"
    environment:
      BACKEND_PORT: "${PORT:-8080}"
      NGINX_ENVSUBST_FILTER: "BACKEND_PORT"
    depends_on:
      - backend

volumes:
  pgdata:
